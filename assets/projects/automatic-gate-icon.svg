<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-labelledby="title desc">
  <title id="title">Automatic gate control system icon</title>
  <desc id="desc">A sensor-controlled gate with distance waves, status lights, and a servo motor.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c3540"/>
      <stop offset="1" stop-color="#0c0b18"/>
    </linearGradient>
    <linearGradient id="gate" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5ff0d0"/>
      <stop offset="1" stop-color="#9b5cff"/>
    </linearGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="8" y="8" width="344" height="204" rx="28" fill="url(#bg)" stroke="#55dcc0" stroke-opacity=".24"/>
  <circle cx="180" cy="108" r="76" fill="none" stroke="#55dcc0" stroke-opacity=".14"/>
  <circle cx="180" cy="108" r="58" fill="none" stroke="#9b5cff" stroke-opacity=".2" stroke-dasharray="6 8"/>
  <path d="M44 174H316" stroke="#6a647a" stroke-opacity=".55" stroke-width="4" stroke-linecap="round"/>
  <rect x="78" y="60" width="18" height="118" rx="7" fill="#101927" stroke="#5ff0d0" stroke-width="3"/>
  <rect x="264" y="60" width="18" height="118" rx="7" fill="#101927" stroke="#9b5cff" stroke-width="3"/>
  <g filter="url(#glow)" stroke="url(#gate)" stroke-width="8" stroke-linecap="round">
    <path d="M94 82L170 106"/>
    <path d="M94 111L170 125"/>
    <path d="M266 82L190 106"/>
    <path d="M266 111L190 125"/>
  </g>
  <rect x="159" y="94" width="42" height="42" rx="12" fill="#111323" stroke="#f3b94d" stroke-width="3"/>
  <circle cx="180" cy="115" r="8" fill="#f3b94d"/>
  <path d="M180 115L196 103" stroke="#fff3ce" stroke-width="3" stroke-linecap="round"/>
  <g fill="none" stroke="#5ff0d0" stroke-width="4" stroke-linecap="round">
    <path d="M50 88c15-15 34-15 49 0"/>
    <path d="M58 100c10-10 22-10 33 0"/>
    <path d="M66 112c5-5 11-5 17 0"/>
  </g>
  <circle cx="69" cy="128" r="6" fill="#5ff0d0" filter="url(#glow)"/>
  <circle cx="291" cy="68" r="7" fill="#70f0a8"/>
  <circle cx="291" cy="91" r="7" fill="#ff607f" opacity=".55"/>
</svg>
