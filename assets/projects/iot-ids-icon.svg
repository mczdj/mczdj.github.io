<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Raspberry Pi network intrusion detection visual</title>
  <desc id="desc">A Raspberry Pi style processor protected by a shield while network packets are scanned around it.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061c24"/>
      <stop offset="1" stop-color="#0b0a1a"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26d9c7"/>
      <stop offset="1" stop-color="#7b5cff"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9b5cff"/>
      <stop offset="1" stop-color="#39e0bd"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="720" height="420" rx="36" fill="url(#bg)"/>
  <g opacity=".35" stroke="#45f0d0" fill="none">
    <circle cx="360" cy="210" r="142"/>
    <circle cx="360" cy="210" r="108" stroke-dasharray="8 13"/>
    <path d="M68 108H235M485 108H652M70 312H236M484 312H650"/>
    <path d="M126 70L276 165M594 70L444 165M126 350L276 255M594 350L444 255" opacity=".6"/>
  </g>
  <g fill="#74f0c8" filter="url(#glow)">
    <circle cx="89" cy="108" r="6"/><circle cx="631" cy="108" r="6"/>
    <circle cx="89" cy="312" r="6"/><circle cx="631" cy="312" r="6"/>
  </g>
  <g transform="translate(285 132)" filter="url(#glow)">
    <rect x="0" y="0" width="150" height="150" rx="28" fill="#0d1524" stroke="url(#chip)" stroke-width="7"/>
    <rect x="34" y="34" width="82" height="82" rx="16" fill="url(#chip)" opacity=".95"/>
    <path d="M14 38H0M14 74H0M14 112H0M150 38h14M150 74h14M150 112h14M38 0V-14M74 0V-14M112 0V-14M38 150v14M74 150v14M112 150v14" stroke="#74f0c8" stroke-width="7" stroke-linecap="round"/>
    <text x="75" y="79" fill="#08111a" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="800">RPI</text>
    <text x="75" y="101" fill="#08111a" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700">NIDS</text>
  </g>
  <path d="M360 242c-30 0-58-8-84-22v37c0 62 35 103 84 123 49-20 84-61 84-123v-37c-26 14-54 22-84 22Z" fill="url(#shield)" opacity=".95" filter="url(#glow)"/>
  <path d="m330 306 20 20 42-47" fill="none" stroke="#08111a" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <g font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#bdfaf0">
    <text x="83" y="92">PACKET</text><text x="565" y="92">SCAN</text>
    <text x="73" y="338">ALERT</text><text x="557" y="338">LOG</text>
  </g>
</svg>
